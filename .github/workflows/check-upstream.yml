name: Check upstream IEEE style
on:
  schedule:
    - cron: '0 0 * * 1' # weekly on Monday
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream ieee.csl
        run: |
          curl -sL https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl \
            -o ieee.csl.upstream

      - name: Check for upstream changes
        id: check
        run: |
          if [ ! -f .upstream-baseline/ieee.csl ]; then
            echo "init=true" >> "$GITHUB_OUTPUT"
          elif ! diff -q .upstream-baseline/ieee.csl ieee.csl.upstream > /dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize baseline
        if: steps.check.outputs.init == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .upstream-baseline
          cp ieee.csl.upstream .upstream-baseline/ieee.csl
          git add -f .upstream-baseline/ieee.csl
          git commit -m "chore: initialize upstream baseline"
          git push

      # 3-way merge: baseline (common ancestor) + upstream (theirs) + ieee.csl (ours)
      - name: Merge upstream changes
        if: steps.check.outputs.changed == 'true'
        id: merge
        run: |
          # git merge-file modifies the first file in place
          # Returns 0 on clean merge, >0 on conflicts
          cp ieee.csl ieee.csl.merged
          if git merge-file ieee.csl.merged .upstream-baseline/ieee.csl ieee.csl.upstream; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-apply clean merge
        if: steps.merge.outputs.clean == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp ieee.csl.merged ieee.csl
          cp ieee.csl.upstream .upstream-baseline/ieee.csl
          git add ieee.csl .upstream-baseline/ieee.csl
          git commit -m "chore: auto-merge upstream IEEE style update"
          git push

      - name: Open PR for conflicting merge
        if: steps.merge.outputs.conflict == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="upstream-conflict-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Include the merged file with conflict markers
          cp ieee.csl.merged ieee.csl
          cp ieee.csl.upstream .upstream-baseline/ieee.csl
          git add ieee.csl .upstream-baseline/ieee.csl
          git commit -m "chore: upstream update with merge conflicts"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Upstream IEEE style update needs manual merge" \
            --body "$(cat <<'EOF'
          ## Merge conflict with upstream

          The upstream `ieee.csl` changed in a way that conflicts with GTAPE customizations.
          The file contains conflict markers (`<<<<<<<`) that need manual resolution.

          See README for the list of GTAPE customizations to preserve.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
